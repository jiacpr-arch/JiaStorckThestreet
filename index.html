<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ระบบสต๊อกสินค้า — บริษัท เจี๋ยรักษา</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#eef2f1;
  --surface:#ffffff;
  --surface-2:#f6f9f8;
  --ink:#16241f;
  --ink-soft:#5a6b65;
  --line:#dde5e2;
  --line-strong:#c6d2ce;
  --primary:#0d7a6e;
  --primary-d:#0a5a51;
  --primary-l:#e3f1ee;
  --ok:#1f9d5b;
  --ok-bg:#e6f5ec;
  --low:#c9810a;
  --low-bg:#fbf0db;
  --out:#cf3a3a;
  --out-bg:#fbe6e6;
  --mono:'IBM Plex Mono',ui-monospace,monospace;
  --radius:14px;
  --shadow:0 1px 2px rgba(16,40,34,.04),0 8px 24px -16px rgba(16,40,34,.25);
}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{
  font-family:'IBM Plex Sans Thai',system-ui,-apple-system,'Segoe UI',sans-serif;
  background:var(--bg);color:var(--ink);
  -webkit-font-smoothing:antialiased;font-size:15px;line-height:1.5;
}
button{font-family:inherit;cursor:pointer}
input,select,textarea{font-family:inherit;font-size:15px}
.hidden{display:none !important}
.mono{font-family:var(--mono)}

/* ---------- LOGIN ---------- */
#login{
  position:fixed;inset:0;display:flex;align-items:center;justify-content:center;
  background:
    radial-gradient(1200px 600px at 80% -10%,rgba(13,122,110,.18),transparent),
    radial-gradient(900px 500px at -10% 110%,rgba(13,122,110,.12),transparent),
    var(--bg);
  padding:20px;z-index:50;
}
.login-card{
  width:100%;max-width:380px;background:var(--surface);border:1px solid var(--line);
  border-radius:22px;padding:36px 32px;box-shadow:var(--shadow);
}
.brand{display:flex;align-items:center;gap:12px;margin-bottom:24px}
.brand .logo{
  width:48px;height:48px;border-radius:14px;display:grid;place-items:center;
  background:linear-gradient(135deg,var(--primary),var(--primary-d));color:#fff;
  font-size:24px;flex:none;
}
.brand h1{font-size:18px;margin:0;line-height:1.2}
.brand p{font-size:12.5px;color:var(--ink-soft);margin:2px 0 0}
.field{margin-bottom:14px}
.field label{display:block;font-size:13px;font-weight:600;margin-bottom:6px;color:var(--ink-soft)}
.field input,.field select,.field textarea{
  width:100%;padding:11px 13px;border:1px solid var(--line-strong);border-radius:10px;
  background:var(--surface-2);color:var(--ink);transition:border-color .15s,box-shadow .15s;
}
.field input:focus,.field select:focus,.field textarea:focus{
  outline:none;border-color:var(--primary);box-shadow:0 0 0 3px var(--primary-l);background:#fff;
}
.btn{
  display:inline-flex;align-items:center;justify-content:center;gap:7px;
  padding:11px 16px;border-radius:10px;border:1px solid transparent;font-weight:600;font-size:14.5px;
  background:var(--surface-2);color:var(--ink);transition:background .15s,border-color .15s,transform .05s;
}
.btn:active{transform:translateY(1px)}
.btn.primary{background:var(--primary);color:#fff}
.btn.primary:hover{background:var(--primary-d)}
.btn.ghost{background:transparent;border-color:var(--line-strong)}
.btn.ghost:hover{background:var(--surface-2)}
.btn.danger{background:var(--out);color:#fff}
.btn.danger:hover{filter:brightness(.93)}
.btn.sm{padding:7px 11px;font-size:13px;border-radius:8px}
.btn.block{width:100%}
.login-err{color:var(--out);font-size:13px;margin-top:4px;min-height:18px}
.login-hint{margin-top:18px;font-size:12px;color:var(--ink-soft);text-align:center;line-height:1.6}

/* ---------- APP SHELL ---------- */
#app{min-height:100vh;display:flex;flex-direction:column}
.topbar{
  position:sticky;top:0;z-index:30;background:rgba(255,255,255,.85);backdrop-filter:blur(10px);
  border-bottom:1px solid var(--line);
}
.topbar-in{max-width:1180px;margin:0 auto;padding:11px 20px;display:flex;align-items:center;gap:16px}
.topbar .logo{
  width:36px;height:36px;border-radius:10px;display:grid;place-items:center;
  background:linear-gradient(135deg,var(--primary),var(--primary-d));color:#fff;font-size:18px;flex:none;
}
.topbar .title{font-weight:700;font-size:15.5px;white-space:nowrap}
.topbar .title small{display:block;font-weight:500;font-size:11.5px;color:var(--ink-soft)}
.nav{display:flex;gap:4px;margin-left:8px}
.nav button{
  border:none;background:transparent;padding:8px 14px;border-radius:9px;font-weight:600;
  color:var(--ink-soft);font-size:14px;
}
.nav button.active{background:var(--primary-l);color:var(--primary-d)}
.nav button:hover:not(.active){background:var(--surface-2)}
.topbar .spacer{flex:1}
.who{font-size:13px;color:var(--ink-soft);display:flex;align-items:center;gap:9px}
.who .dot{width:7px;height:7px;border-radius:50%;background:var(--ok)}

.main{max-width:1180px;margin:0 auto;padding:24px 20px 60px;width:100%}
.page-head{display:flex;align-items:flex-end;gap:14px;margin-bottom:20px;flex-wrap:wrap}
.page-head h2{margin:0;font-size:22px;letter-spacing:-.3px}
.page-head p{margin:3px 0 0;color:var(--ink-soft);font-size:13.5px}

/* ---------- DASHBOARD ---------- */
.stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:14px;margin-bottom:24px}
.stat{
  background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:18px;
  box-shadow:var(--shadow);position:relative;overflow:hidden;
}
.stat .k{font-size:12.5px;color:var(--ink-soft);font-weight:600;display:flex;align-items:center;gap:7px}
.stat .v{font-size:28px;font-weight:700;margin-top:8px;letter-spacing:-.5px;font-family:var(--mono)}
.stat .sub{font-size:12px;color:var(--ink-soft);margin-top:2px}
.stat .ic{position:absolute;right:14px;top:14px;font-size:22px;opacity:.5}
.stat.accent{border-color:var(--primary);background:linear-gradient(135deg,var(--primary),var(--primary-d));color:#fff}
.stat.accent .k,.stat.accent .sub{color:rgba(255,255,255,.8)}
.stat.warn .v{color:var(--low)}
.stat.bad .v{color:var(--out)}

.cols{display:grid;grid-template-columns:1.2fr 1fr;gap:18px}
.panel{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden}
.panel-h{padding:15px 18px;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between}
.panel-h h3{margin:0;font-size:15px}
.panel-h .count{font-size:12px;color:var(--ink-soft);font-weight:600}
.panel-body{padding:6px 0}
.empty{padding:34px 18px;text-align:center;color:var(--ink-soft);font-size:13.5px}

.li{display:flex;align-items:center;gap:12px;padding:11px 18px;border-bottom:1px solid var(--surface-2)}
.li:last-child{border-bottom:none}
.li .ava{width:38px;height:38px;border-radius:9px;background:var(--surface-2);display:grid;place-items:center;font-size:19px;flex:none;overflow:hidden}
.li .ava img{width:100%;height:100%;object-fit:cover}
.li .meta{flex:1;min-width:0}
.li .meta .nm{font-weight:600;font-size:13.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.li .meta .sk{font-size:11.5px;color:var(--ink-soft);font-family:var(--mono)}
.li .right{text-align:right;flex:none}
.pill{display:inline-flex;align-items:center;gap:5px;padding:3px 9px;border-radius:999px;font-size:11.5px;font-weight:700;white-space:nowrap}
.pill.ok{background:var(--ok-bg);color:var(--ok)}
.pill.low{background:var(--low-bg);color:var(--low)}
.pill.out{background:var(--out-bg);color:var(--out)}
.hist-line{font-size:11.5px;color:var(--ink-soft)}
.hist-q{font-family:var(--mono);font-weight:600}
.hist-q.in{color:var(--ok)}
.hist-q.out{color:var(--out)}

/* ---------- PRODUCTS TOOLBAR ---------- */
.toolbar{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-bottom:16px}
.search{position:relative;flex:1;min-width:200px}
.search input{width:100%;padding:10px 12px 10px 36px;border:1px solid var(--line-strong);border-radius:10px;background:var(--surface)}
.search input:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 3px var(--primary-l)}
.search .si{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--ink-soft);font-size:15px}
.toolbar select{padding:10px 12px;border:1px solid var(--line-strong);border-radius:10px;background:var(--surface);color:var(--ink)}
.toolbar select:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 3px var(--primary-l)}
.viewtoggle{display:flex;border:1px solid var(--line-strong);border-radius:10px;overflow:hidden;background:var(--surface)}
.viewtoggle button{border:none;background:transparent;padding:9px 13px;font-size:16px;color:var(--ink-soft)}
.viewtoggle button.active{background:var(--primary-l);color:var(--primary-d)}

/* ---------- TABLE VIEW ---------- */
.tablewrap{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden}
table{width:100%;border-collapse:collapse}
thead th{
  text-align:left;font-size:11.5px;font-weight:700;color:var(--ink-soft);text-transform:uppercase;letter-spacing:.4px;
  padding:12px 14px;background:var(--surface-2);border-bottom:1px solid var(--line);white-space:nowrap;
}
thead th.num,tbody td.num{text-align:right}
thead th.ctr,tbody td.ctr{text-align:center}
tbody td{padding:10px 14px;border-bottom:1px solid var(--surface-2);vertical-align:middle}
tbody tr:hover{background:var(--surface-2)}
tbody tr:last-child td{border-bottom:none}
.cell-prod{display:flex;align-items:center;gap:11px;min-width:220px}
.cell-prod .ava{width:40px;height:40px;border-radius:9px;background:var(--surface-2);display:grid;place-items:center;font-size:20px;flex:none;overflow:hidden}
.cell-prod .ava img{width:100%;height:100%;object-fit:cover}
.cell-prod .nm{font-weight:600;font-size:13.5px;line-height:1.3}
.cell-prod .sk{font-size:11px;color:var(--ink-soft);font-family:var(--mono)}
.cat-tag{font-size:11.5px;color:var(--ink-soft);white-space:nowrap}
.qty-big{font-family:var(--mono);font-weight:700;font-size:15px}
.row-actions{display:flex;gap:5px;justify-content:flex-end;white-space:nowrap}
.iconbtn{
  width:30px;height:30px;border-radius:8px;border:1px solid var(--line-strong);background:var(--surface);
  display:grid;place-items:center;font-size:14px;color:var(--ink-soft);transition:.12s;
}
.iconbtn:hover{background:var(--surface-2);color:var(--ink);border-color:var(--line-strong)}
.iconbtn.in:hover{background:var(--ok-bg);color:var(--ok);border-color:var(--ok)}
.iconbtn.out:hover{background:var(--low-bg);color:var(--low);border-color:var(--low)}
.iconbtn.del:hover{background:var(--out-bg);color:var(--out);border-color:var(--out)}
.serial-flag{font-size:10px;font-weight:700;color:var(--primary-d);background:var(--primary-l);padding:1px 6px;border-radius:5px;margin-left:6px}

/* ---------- CARD VIEW ---------- */
.cardgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:14px}
.pcard{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden;display:flex;flex-direction:column}
.pcard .thumb{height:120px;background:var(--surface-2);display:grid;place-items:center;font-size:48px;position:relative;overflow:hidden}
.pcard .thumb img{width:100%;height:100%;object-fit:cover}
.pcard .thumb .stbadge{position:absolute;top:9px;right:9px}
.pcard .body{padding:13px 14px;flex:1;display:flex;flex-direction:column}
.pcard .nm{font-weight:600;font-size:14px;line-height:1.35;margin-bottom:3px}
.pcard .sk{font-size:11px;color:var(--ink-soft);font-family:var(--mono);margin-bottom:9px}
.pcard .figs{display:flex;justify-content:space-between;align-items:flex-end;margin-top:auto}
.pcard .figs .q{font-family:var(--mono);font-weight:700;font-size:20px}
.pcard .figs .q small{font-size:11px;color:var(--ink-soft);font-weight:500;font-family:'IBM Plex Sans Thai'}
.pcard .figs .pr{font-size:13px;color:var(--ink-soft);font-family:var(--mono)}
.pcard .cardacts{display:flex;gap:6px;padding:0 14px 13px}
.pcard .cardacts .btn{flex:1}

/* ---------- PAGINATION ---------- */
.pager{display:flex;align-items:center;justify-content:space-between;margin-top:18px;flex-wrap:wrap;gap:12px}
.pager .info{font-size:13px;color:var(--ink-soft)}
.pager .pages{display:flex;gap:5px}
.pager .pages button{
  min-width:34px;height:34px;border:1px solid var(--line-strong);background:var(--surface);border-radius:8px;
  font-weight:600;font-size:13.5px;color:var(--ink);padding:0 8px;
}
.pager .pages button.active{background:var(--primary);color:#fff;border-color:var(--primary)}
.pager .pages button:disabled{opacity:.4;cursor:not-allowed}
.pager .pages button:not(.active):not(:disabled):hover{background:var(--surface-2)}

/* ---------- HISTORY PAGE ---------- */
.hist-row{display:flex;align-items:center;gap:13px;padding:13px 18px;border-bottom:1px solid var(--surface-2)}
.hist-row:last-child{border-bottom:none}
.hist-ic{width:36px;height:36px;border-radius:9px;display:grid;place-items:center;font-size:16px;flex:none}
.hist-ic.in{background:var(--ok-bg);color:var(--ok)}
.hist-ic.out{background:var(--out-bg);color:var(--out)}
.hist-ic.add{background:var(--primary-l);color:var(--primary-d)}
.hist-ic.edit{background:var(--surface-2);color:var(--ink-soft)}
.hist-ic.del{background:var(--out-bg);color:var(--out)}
.hist-main{flex:1;min-width:0}
.hist-main .t1{font-weight:600;font-size:13.5px}
.hist-main .t2{font-size:11.5px;color:var(--ink-soft);font-family:var(--mono)}
.hist-right{text-align:right;flex:none}
.hist-right .delta{font-family:var(--mono);font-weight:700;font-size:15px}
.hist-right .when{font-size:11px;color:var(--ink-soft)}

/* ---------- MODAL ---------- */
.overlay{position:fixed;inset:0;background:rgba(16,36,31,.42);backdrop-filter:blur(2px);z-index:60;display:flex;align-items:flex-start;justify-content:center;padding:30px 16px;overflow-y:auto}
.modal{background:var(--surface);width:100%;max-width:560px;border-radius:18px;box-shadow:0 24px 60px -20px rgba(16,40,34,.5);animation:pop .18s ease}
.modal.sm{max-width:420px}
@keyframes pop{from{transform:translateY(10px) scale(.98);opacity:0}to{transform:none;opacity:1}}
.modal-h{padding:18px 22px;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between}
.modal-h h3{margin:0;font-size:17px}
.modal-h .x{border:none;background:transparent;font-size:22px;color:var(--ink-soft);width:32px;height:32px;border-radius:8px;line-height:1}
.modal-h .x:hover{background:var(--surface-2)}
.modal-b{padding:20px 22px}
.modal-f{padding:16px 22px;border-top:1px solid var(--line);display:flex;gap:10px;justify-content:flex-end}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.hint{font-size:11.5px;color:var(--ink-soft);margin-top:5px}

/* image picker */
.imgpick{display:flex;gap:14px;align-items:flex-start}
.imgprev{width:88px;height:88px;border-radius:12px;background:var(--surface-2);border:1px solid var(--line-strong);display:grid;place-items:center;font-size:40px;flex:none;overflow:hidden}
.imgprev img{width:100%;height:100%;object-fit:cover}
.imgctrls{flex:1;display:flex;flex-direction:column;gap:8px}
.segtabs{display:flex;gap:4px;background:var(--surface-2);padding:3px;border-radius:9px}
.segtabs button{flex:1;border:none;background:transparent;padding:6px;border-radius:7px;font-size:12.5px;font-weight:600;color:var(--ink-soft)}
.segtabs button.active{background:#fff;color:var(--primary-d);box-shadow:0 1px 3px rgba(0,0,0,.08)}

/* serial editor */
.serial-box{border:1px solid var(--line);border-radius:10px;overflow:hidden;margin-top:6px}
.serial-box table{font-size:12.5px}
.serial-box th{padding:8px 10px}
.serial-box td{padding:5px 8px}
.serial-box input{width:100%;padding:6px 8px;border:1px solid var(--line);border-radius:7px;background:var(--surface-2)}
.serial-add{padding:8px 10px;text-align:center;border-top:1px solid var(--line)}

.adjbig{text-align:center;padding:6px 0 16px}
.adjbig .cur{font-size:13px;color:var(--ink-soft)}
.adjbig .num{font-size:40px;font-weight:700;font-family:var(--mono);letter-spacing:-1px;margin:4px 0}
.adjbig .arrow{font-size:20px;color:var(--ink-soft);margin:0 10px}
.adjbig .next{color:var(--primary-d)}
.stepper{display:flex;align-items:center;gap:10px;justify-content:center;margin-top:8px}
.stepper button{width:44px;height:44px;border-radius:12px;border:1px solid var(--line-strong);background:var(--surface);font-size:22px;font-weight:700;color:var(--primary-d)}
.stepper button:hover{background:var(--primary-l)}
.stepper input{width:90px;text-align:center;font-size:22px;font-weight:700;font-family:var(--mono);padding:10px;border:1px solid var(--line-strong);border-radius:12px}

/* toast */
#toasts{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);z-index:80;display:flex;flex-direction:column;gap:9px;align-items:center}
.toast{background:var(--ink);color:#fff;padding:11px 18px;border-radius:11px;font-size:13.5px;font-weight:500;box-shadow:0 10px 30px -8px rgba(0,0,0,.4);animation:tin .25s ease;display:flex;align-items:center;gap:9px}
.toast.ok{background:var(--primary-d)}
.toast.bad{background:var(--out)}
@keyframes tin{from{transform:translateY(14px);opacity:0}to{transform:none;opacity:1}}

@media (max-width:820px){
  .cols{grid-template-columns:1fr}
  .nav button{padding:8px 11px}
  .topbar .title small{display:none}
}
@media (max-width:560px){
  .main{padding:18px 14px 50px}
  .topbar-in{padding:10px 14px;gap:10px}
  .grid2{grid-template-columns:1fr}
  .page-head h2{font-size:19px}
  .hide-sm{display:none !important}
}
@media (prefers-reduced-motion:reduce){*{animation:none !important;transition:none !important}}

/* ---- online status / loading / error ---- */
.who .dot.ok{background:var(--ok)} .who .dot.bad{background:var(--out)}
#loading{position:fixed;top:0;left:0;right:0;height:3px;z-index:90;overflow:hidden;background:transparent}
#loading .lbar{height:100%;width:40%;background:linear-gradient(90deg,transparent,var(--primary),transparent);animation:lbar 1s linear infinite}
@keyframes lbar{0%{transform:translateX(-100%)}100%{transform:translateX(350%)}}
.conn-err{display:flex;gap:14px;align-items:center;background:var(--out-bg);border:1px solid #f0b4b4;border-radius:var(--radius);padding:14px 16px;margin-bottom:18px}
.conn-err .ce-ic{font-size:22px}
.conn-err .ce-body{flex:1}
.conn-err .ce-title{font-weight:700;color:var(--out);font-size:14.5px}
.conn-err .ce-msg{font-size:12.5px;color:var(--out);font-family:var(--mono);margin-top:2px;word-break:break-word}
.conn-err .ce-hint{font-size:12px;color:var(--ink-soft);margin-top:5px}
#btn-refresh{white-space:nowrap}
</style>
</head>
<body>

<!-- ===== LOGIN ===== -->
<div id="login">
  <div class="login-card">
    <div class="brand">
      <div class="logo">✚</div>
      <div>
        <h1>ระบบสต๊อกสินค้า</h1>
        <p>บริษัท เจี๋ยรักษา</p>
      </div>
    </div>
    <div class="field">
      <label>ชื่อผู้ใช้</label>
      <input id="lg-user" type="text" autocomplete="username" placeholder="admin">
    </div>
    <div class="field">
      <label>รหัสผ่าน</label>
      <input id="lg-pass" type="password" autocomplete="current-password" placeholder="••••••••">
    </div>
    <div class="login-err" id="lg-err"></div>
    <button class="btn primary block" id="lg-btn">เข้าสู่ระบบ</button>
    <div class="login-hint">ระบบจัดการสต๊อกอุปกรณ์การแพทย์<br>บันทึกข้อมูลในเครื่องนี้ (localStorage)</div>
  </div>
</div>

<!-- ===== APP ===== -->
<div id="app" class="hidden">
  <header class="topbar">
    <div class="topbar-in">
      <div class="logo">✚</div>
      <div class="title">เจี๋ยรักษา<small>ระบบสต๊อกสินค้า</small></div>

/* ============ API CONFIG ============ */
const API_URL   = 'https://script.google.com/macros/s/AKfycbynkhabuLrASUwihmEZNC04JsvpRgBu1RcCO3cywgifrSdYHuA4z_cX-FGja3kUOx71/exec';
const API_TOKEN = 'jia-secret-2026';   // ← ต้องตรงกับ TOKEN ใน Code.gs

async function apiGet(action, params){
  const u = new URL(API_URL);
  u.searchParams.set('action', action);
  u.searchParams.set('token', API_TOKEN);
  Object.entries(params||{}).forEach(([k,v])=>u.searchParams.set(k,v));
  const res = await fetch(u.toString(), {method:'GET', redirect:'follow'});
  const data = await res.json();
  if(!data.ok) throw new Error(data.error||'ผิดพลาด');
  return data;
}
async function apiPost(action, payload){
  const res = await fetch(API_URL, {
    method:'POST', redirect:'follow',
    headers:{'Content-Type':'text/plain;charset=utf-8'},
    body: JSON.stringify({action, token:API_TOKEN, ...(payload||{})})
  });
  const data = await res.json();
  if(!data.ok) throw new Error(data.error||'ผิดพลาด');
  return data;
}

/* ============ DOM/HELPERS ============ */
const $  = (s,r=document)=>r.querySelector(s);
const $$ = (s,r=document)=>[...r.querySelectorAll(s)];
function esc(s){ return String(s==null?'':s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function nf(n){ return Number(n||0).toLocaleString('en-US'); }
function baht(n){ return Number(n||0).toLocaleString('en-US'); }
function status(p){ if(p.qty<=0) return 'out'; if(p.qty<=p.minQty) return 'low'; return 'ok'; }
const STATUS_TXT = { ok:'ปกติ', low:'ใกล้หมด', out:'หมด' };
function nextSku(prefix){
  const re=new RegExp('^'+prefix+'-(\\d+)$'); let mx=0;
  DB.products.forEach(p=>{ const m=(p.sku||'').match(re); if(m) mx=Math.max(mx,+m[1]); });
  return prefix+'-'+String(mx+1).padStart(3,'0');
}
function relTime(iso){
  const d=new Date(iso), s=(Date.now()-d)/1000;
  if(s<60) return 'เมื่อสักครู่';
  if(s<3600) return Math.floor(s/60)+' นาทีที่แล้ว';
  if(s<86400) return Math.floor(s/3600)+' ชม.ที่แล้ว';
  if(s<604800) return Math.floor(s/86400)+' วันที่แล้ว';
  return d.toLocaleDateString('th-TH',{day:'numeric',month:'short',year:'2-digit'});
}
function fullTime(iso){ return new Date(iso).toLocaleString('th-TH',{day:'numeric',month:'short',year:'2-digit',hour:'2-digit',minute:'2-digit'}); }
/* รูปภาพ: 'auto' = เดาจาก SKU ในโฟลเดอร์ images/, ลองหลายนามสกุล, ไม่เจอ → อิโมจิ */
const IMG_EXT = ['jpg','png','jpeg','webp','JPG','PNG'];
function imgTag(p){
  const emoji = catEmoji(p.cat);
  if(!p.img) return emoji;
  if(p.img==='auto'){
    if(!p.sku) return emoji;
    return `<img src="images/${encodeURIComponent(p.sku)}.${IMG_EXT[0]}" data-sku="${esc(p.sku)}" data-emoji="${esc(emoji)}" data-try="0" onerror="imgFB(this)" alt="">`;
  }
  return `<img src="${esc(p.img)}" data-emoji="${esc(emoji)}" onerror="imgFBemoji(this)" alt="">`;
}
window.imgFB=function(el){
  let t=(+el.dataset.try||0)+1;
  if(t < IMG_EXT.length){ el.dataset.try=t; el.src='images/'+encodeURIComponent(el.dataset.sku)+'.'+IMG_EXT[t]; }
  else imgFBemoji(el);
};
window.imgFBemoji=function(el){ const s=document.createElement('span'); s.textContent=el.dataset.emoji||'📦'; el.replaceWith(s); };
function avatar(p){ return imgTag(p); }

/* ============ TOAST + LOADING ============ */
function toast(msg, kind){
  const t=document.createElement('div');
  t.className='toast'+(kind?' '+kind:'');
  t.innerHTML=(kind==='ok'?'✓ ':kind==='bad'?'✕ ':'')+esc(msg);
  $('#toasts').appendChild(t);
  setTimeout(()=>{ t.style.opacity='0'; t.style.transform='translateY(8px)'; setTimeout(()=>t.remove(),250); },2400);
}
let busyN=0;
function busy(on){ busyN+=on?1:-1; busyN=Math.max(0,busyN); $('#loading').classList.toggle('hidden', busyN===0); }
async function withBusy(fn){ busy(true); try{ return await fn(); } finally{ busy(false); } }

/* ============ DATA REFRESH (from Sheet) ============ */
async function refresh(){
  try{
    await withBusy(async()=>{
      const d = await apiGet('list');
      DB.products = d.products||[]; DB.history = d.history||[];
    });
    $('#conn-err').classList.add('hidden');
    setSync('ok');
    if(curPage==='dashboard') renderDash();
    else if(curPage==='products') renderProducts();
    else renderHistory();
  }catch(err){ showConnError(err); }
}
function setSync(state){
  const el=$('#sync'); if(!el) return;
  if(state==='ok'){ el.innerHTML='<span class="dot ok"></span>เชื่อมต่อชีตแล้ว'; }
  else { el.innerHTML='<span class="dot bad"></span>ขาดการเชื่อมต่อ'; }
}
function showConnError(err){
  setSync('bad');
  $('#conn-err').classList.remove('hidden');
  $('#conn-err-msg').textContent = String(err && err.message || err);
}

/* ============ ROUTER ============ */
function go(p){
  curPage=p;
  $$('#nav button').forEach(b=>b.classList.toggle('active',b.dataset.page===p));
  ['dashboard','products','history'].forEach(x=>$('#page-'+x).classList.toggle('hidden',x!==p));
  if(p==='dashboard') renderDash();
  if(p==='products') renderProducts();
  if(p==='history') renderHistory();
  window.scrollTo({top:0,behavior:'smooth'});
}

  if(fCat) r=r.filter(p=>p.cat===fCat);

}

function drawList(){

        <td class="num hide-sm mono">${p.price?'฿'+baht(p.price):'—'}</td>
        <td class="num"><span class="qty-big">${p.qty}</span> <span style="color:var(--ink-soft);font-size:12px">${esc(p.unit)}</span></td>
        <td class="ctr"><span class="pill ${st}">${STATUS_TXT[st]}</span></td>
        <td class="num"><div class="row-actions">
          <button class="iconbtn in" title="รับเข้า" data-in="${p.id}">＋</button>
          <button class="iconbtn out" title="จ่ายออก" data-out="${p.id}">－</button>
          <button class="iconbtn" title="แก้ไข" data-edit="${p.id}">✏️</button>
          <button class="iconbtn del" title="ลบ" data-del="${p.id}">🗑️</button>
        </div></td></tr>`; }).join('')}
      </tbody></table></div>`;
  }else{
    host.innerHTML=`<div class="cardgrid">${slice.map(p=>{ const st=status(p); return `
      <div class="pcard">
        <div class="thumb">${imgTag(p)}<span class="stbadge"><span class="pill ${st}">${STATUS_TXT[st]}</span></span></div>
        <div class="body">
          <div class="nm">${esc(p.name)}${p.trackSerial?'<span class="serial-flag">SN</span>':''}</div>
          <div class="sk">${esc(p.sku)} · ${esc(p.cat)}</div>
          <div class="figs"><div class="q">${p.qty}<small> ${esc(p.unit)}</small></div><div class="pr">${p.price?'฿'+baht(p.price):'—'}</div></div>
        </div>
        <div class="cardacts">
          <button class="btn ghost sm" data-in="${p.id}">＋ รับ</button>
          <button class="btn ghost sm" data-out="${p.id}">－ จ่าย</button>
          <button class="btn ghost sm" data-edit="${p.id}">แก้ไข</button>
        </div>
      </div>`; }).join('')}</div>`;
  }
  host.querySelectorAll('[data-in]').forEach(b=>b.onclick=()=>openAdjust(+b.dataset.in,'in'));
  host.querySelectorAll('[data-out]').forEach(b=>b.onclick=()=>openAdjust(+b.dataset.out,'out'));
  host.querySelectorAll('[data-edit]').forEach(b=>b.onclick=()=>openProductForm(+b.dataset.edit));
  host.querySelectorAll('[data-del]').forEach(b=>b.onclick=()=>openDelete(+b.dataset.del));
  const from=(page-1)*PER+1, to=Math.min(page*PER,all.length);
  let btns=''; const add=(n,lbl,dis,act)=>{ btns+=`<button ${dis?'disabled':''} class="${act?'active':''}" data-pg="${n}">${lbl}</button>`; };
  add(page-1,'‹',page<=1,false);
  const win=[]; for(let i=1;i<=pages;i++){ if(i===1||i===pages||Math.abs(i-page)<=1) win.push(i); else if(win[win.length-1]!=='…') win.push('…'); }
  win.forEach(i=>{ if(i==='…') btns+=`<button disabled>…</button>`; else add(i,i,false,i===page); });
  add(page+1,'›',page>=pages,false);
  $('#prod-pager').innerHTML=`<div class="pager"><div class="info">แสดง ${from}–${to} จาก ${all.length} รายการ</div><div class="pages">${btns}</div></div>`;

/* ============ MODAL CORE ============ */
function modal(html){
  const root=$('#modal-root'); root.innerHTML=`<div class="overlay">${html}</div>`;
  const ov=root.firstElementChild; ov.onclick=e=>{ if(e.target===ov) closeModal(); };
  document.addEventListener('keydown',escClose); return ov;
}
function closeModal(){ $('#modal-root').innerHTML=''; document.removeEventListener('keydown',escClose); }
function escClose(e){ if(e.key==='Escape') closeModal(); }
function confirmBox(title,msg,okLabel,onOk,danger=true){
  modal(`<div class="modal sm">
    <div class="modal-h"><h3>${esc(title)}</h3><button class="x" data-x>×</button></div>
    <div class="modal-b"><p style="margin:0;color:var(--ink-soft);font-size:14px">${esc(msg)}</p></div>
    <div class="modal-f"><button class="btn ghost" data-x>ยกเลิก</button><button class="btn ${danger?'danger':'primary'}" data-ok>${esc(okLabel)}</button></div>
  </div>`);
  $$('#modal-root [data-x]').forEach(b=>b.onclick=closeModal);
  $('#modal-root [data-ok]').onclick=()=>{ closeModal(); onOk(); };
}

/* ============ STOCK IN/OUT ============ */
function openAdjust(id,dir){
  const p=DB.products.find(x=>x.id===id); if(!p) return;
  let amt=1; const isIn=dir==='in';
  modal(`<div class="modal sm">
    <div class="modal-h"><h3>${isIn?'📥 รับเข้าสต๊อก':'📤 จ่ายออกสต๊อก'}</h3><button class="x" data-x>×</button></div>
    <div class="modal-b">
      <div class="li" style="border:1px solid var(--line);border-radius:10px;padding:11px 13px;margin-bottom:6px">
        <div class="ava">${avatar(p)}</div>
        <div class="meta"><div class="nm">${esc(p.name)}</div><div class="sk">${esc(p.sku)} · ${esc(p.cat)}</div></div>
      </div>
      <div class="adjbig">
        <div class="cur">คงเหลือปัจจุบัน</div>
        <div><span class="num">${p.qty}</span><span class="arrow">→</span><span class="num next" id="adj-next">${p.qty+(isIn?amt:-amt)}</span></div>
        <div class="stepper"><button data-step="-1">−</button><input id="adj-amt" type="number" min="1" value="1"><button data-step="1">＋</button></div>
        <div class="hint" id="adj-warn" style="color:var(--out)"></div>
      </div>
      <div class="field"><label>หมายเหตุ (ไม่บังคับ)</label><input id="adj-note" placeholder="${isIn?'เช่น รับจากซัพพลายเออร์':'เช่น เบิกไปอบรม / ขายให้ลูกค้า'}"></div>
    </div>
    <div class="modal-f"><button class="btn ghost" data-x>ยกเลิก</button><button class="btn ${isIn?'primary':''}" id="adj-ok" ${isIn?'':'style="background:var(--low);color:#fff"'}>ยืนยัน${isIn?'รับเข้า':'จ่ายออก'}</button></div>
  </div>`);
  const inp=$('#adj-amt'), nextEl=$('#adj-next'), warn=$('#adj-warn'), ok=$('#adj-ok');
  function refreshUI(){
    amt=Math.max(1,Math.floor(+inp.value||1)); inp.value=amt;
    const after=isIn? p.qty+amt : p.qty-amt; nextEl.textContent=after;
    if(!isIn && after<0){ warn.textContent='จำนวนจ่ายออกมากกว่าคงเหลือ'; ok.disabled=true; ok.style.opacity=.5; }
    else { warn.textContent=''; ok.disabled=false; ok.style.opacity=1; }
  }
  $$('#modal-root [data-step]').forEach(b=>b.onclick=()=>{ inp.value=Math.max(1,(+inp.value||1)+(+b.dataset.step)); refreshUI(); });
  inp.oninput=refreshUI; refreshUI();
  $$('#modal-root [data-x]').forEach(b=>b.onclick=closeModal);
  ok.onclick=async()=>{
    const note=$('#adj-note').value.trim();
    try{
      const r=await withBusy(()=>apiPost('move',{id:p.id, type:isIn?'in':'out', amount:amt, note}));
      p.qty=r.qty; closeModal();
      toast(`${isIn?'รับเข้า':'จ่ายออก'} ${esc(p.name)} ${amt} ${esc(p.unit)}`,'ok');
      await refresh();
    }catch(err){ toast('ล้มเหลว: '+err.message,'bad'); }
  };
}

      $('#img-file').oninput=e=>{ imgTmp = e.target.value.trim()? 'images/'+e.target.value.trim() : ''; paintPrev(); };
    }
    else if(imgMode==='url'){ a.innerHTML=`<input id="img-url" placeholder="วางลิงก์รูป https://..." value="${/^https?:/.test(imgTmp)?esc(imgTmp):''}"><div class="hint">วางลิงก์รูปจากอินเทอร์เน็ต</div>`; $('#img-url').oninput=e=>{ imgTmp=e.target.value.trim(); paintPrev(); }; }
    else { a.innerHTML=`<button class="btn ghost block" id="img-up">📁 เลือกไฟล์รูปจากเครื่อง</button><div class="hint">ย่อขนาดอัตโนมัติแล้วฝังในชีต — เหมาะกับรูปเล็ก ถ้ารูปเยอะแนะนำใช้โหมดโฟลเดอร์</div>`; $('#img-up').onclick=()=>pickFile(); }
  }
  $$('#modal-root [data-im]').forEach(b=>b.onclick=()=>{ imgMode=b.dataset.im; paintImgArea(); });
  paintImgArea(); paintPrev();
  $('#p-cat').oninput=()=>{ if(imgMode==='emoji') paintImgArea(); paintPrev(); };
  window._onFile=(dataUrl)=>{ imgTmp=dataUrl; imgMode='upload'; paintPrev(); toast('แนบรูปแล้ว','ok'); };
  function paintSerials(){
    const w=$('#serial-wrap'); if(!$('#p-serial').checked){ w.classList.add('hidden'); return; }
    w.classList.remove('hidden'); const rows=p.serials||[];
    w.innerHTML=`<div class="field"><label>หมายเลขเครื่อง (${rows.length})</label>
      <div class="serial-box"><table><thead><tr><th>Machine SN</th><th>Battery SN</th><th style="width:34px"></th></tr></thead><tbody>
        ${rows.map((s,i)=>`<tr><td><input data-sn="${i}" data-k="machineSn" value="${esc(s.machineSn||'')}"></td><td><input data-sn="${i}" data-k="batterySn" value="${esc(s.batterySn||'')}"></td><td><button class="iconbtn del" data-rm="${i}" style="width:26px;height:26px">×</button></td></tr>`).join('')}
      </tbody></table><div class="serial-add"><button class="btn ghost sm" id="sn-add">＋ เพิ่มหมายเลข</button></div></div></div>`;
    w.querySelectorAll('[data-sn]').forEach(inp=>inp.oninput=e=>{ p.serials[+e.target.dataset.sn][e.target.dataset.k]=e.target.value; });
    w.querySelectorAll('[data-rm]').forEach(b=>b.onclick=()=>{ p.serials.splice(+b.dataset.rm,1); paintSerials(); });
    $('#sn-add').onclick=()=>{ p.serials.push({machineSn:'',batterySn:'',date:'',note:''}); paintSerials(); };
  }
  $('#p-serial').onchange=()=>{ if($('#p-serial').checked && !p.serials.length) p.serials.push({machineSn:'',batterySn:'',date:'',note:''}); paintSerials(); };
  paintSerials();
  const dl=$('#p-del'); if(dl) dl.onclick=()=>{ closeModal(); openDelete(id); };
  $('#p-save').onclick=async()=>{
    const sku=$('#p-sku').value.trim(), name=$('#p-name').value.trim(), cat=$('#p-cat').value.trim();
    if(!name){ toast('กรุณากรอกชื่อสินค้า','bad'); return; }
    if(!cat){ toast('กรุณาเลือก/กรอกหมวดหมู่','bad'); return; }
    const dupe=DB.products.find(x=>x.sku && x.sku===sku && x.id!==id);
    if(sku && dupe){ toast('SKU นี้มีอยู่แล้ว','bad'); return; }
    const data={
      id: editing? id : null,
      sku: sku || (editing? p.sku : nextSku('MSC')),
      name, cat,
      price:Math.max(0,+$('#p-price').value||0),
      unit:$('#p-unit').value.trim()||'ชิ้น',
      minQty:Math.max(0,+$('#p-min').value||0),
      note:$('#p-note').value.trim(),
      trackSerial:$('#p-serial').checked,
      serials:$('#p-serial').checked? p.serials.filter(s=>s.machineSn||s.batterySn) : [],
      img:imgTmp,
      qty: editing? src.qty : Math.max(0,+$('#p-qty').value||0)
    };
    try{
      await withBusy(()=>apiPost('upsert',{product:data}));
      closeModal();
      toast(editing?'บันทึกการแก้ไขแล้ว':'เพิ่มสินค้าแล้ว','ok');
      await refresh();
    }catch(err){ toast('บันทึกไม่สำเร็จ: '+err.message,'bad'); }
  };
}

/* ============ DELETE ============ */
function openDelete(id){
  const p=DB.products.find(x=>x.id===id); if(!p) return;
  confirmBox('ลบสินค้า?', `ต้องการลบ "${p.name}" (${p.sku}) ออกจากชีตถาวรหรือไม่`, 'ลบสินค้า', async()=>{
    try{ await withBusy(()=>apiPost('delete',{id})); toast('ลบสินค้าแล้ว','ok'); await refresh(); }
    catch(err){ toast('ลบไม่สำเร็จ: '+err.message,'bad'); }
  });
}

/* ============ FILE PICKER + RESIZE ============ */
function pickFile(){ $('#hidden-file').value=''; $('#hidden-file').click(); }
$('#hidden-file').addEventListener('change',function(){
  const file=this.files[0]; if(!file) return;
  const reader=new FileReader();
  reader.onload=e=>{
    const img=new Image();
    img.onload=()=>{
      const max=300; let w=img.width,h=img.height;
      if(w>h && w>max){ h=h*max/w; w=max; } else if(h>max){ w=w*max/h; h=max; }
      const cv=document.createElement('canvas'); cv.width=w; cv.height=h;
      cv.getContext('2d').drawImage(img,0,0,w,h);
      const out=cv.toDataURL('image/jpeg',0.7);
      if(out.length>48000){ toast('รูปใหญ่เกินไปสำหรับเก็บในชีต — แนะนำใช้โหมดโฟลเดอร์','bad'); return; }
      if(window._onFile) window._onFile(out);
    };
    img.src=e.target.result;
  };
  reader.readAsDataURL(file);
});

/* ============ BACKUP / RESTORE ============ */
function openBackup(){
  modal(`<div class="modal sm">
    <div class="modal-h"><h3>สำรอง / กู้คืนข้อมูล</h3><button class="x" data-x>×</button></div>
    <div class="modal-b">
      <p style="margin:0 0 14px;color:var(--ink-soft);font-size:13.5px">ดาวน์โหลดสำเนาข้อมูลจากชีต หรือเขียนข้อมูลจากไฟล์ .json กลับขึ้นชีต</p>
      <button class="btn primary block" id="bk-down" style="margin-bottom:10px">⬇ ดาวน์โหลดไฟล์สำรอง (.json)</button>
      <button class="btn ghost block" id="bk-up" style="margin-bottom:10px">⬆ กู้คืนขึ้นชีต (จากไฟล์ .json)</button>
      <button class="btn ghost block" id="bk-xlsx">📊 ส่งออกเป็น CSV (เปิดใน Excel)</button>
      <input type="file" id="bk-file" accept=".json,application/json" class="hidden">
    </div>
    <div class="modal-f"><button class="btn ghost" data-x>ปิด</button></div>
  </div>`);
  $$('#modal-root [data-x]').forEach(b=>b.onclick=closeModal);
  $('#bk-down').onclick=()=>{
    const data={ exportedAt:new Date().toISOString().slice(0,10), company:'บริษัท เจี๋ยรักษา', products:DB.products, history:DB.history };
    download(JSON.stringify(data,null,2), `stock_backup_${new Date().toISOString().slice(0,10)}.json`, 'application/json');
    toast('ดาวน์โหลดแล้ว','ok');
  };
  $('#bk-up').onclick=()=>$('#bk-file').click();
  $('#bk-file').onchange=function(){
    const f=this.files[0]; if(!f) return; const r=new FileReader();
    r.onload=e=>{ try{
      const d=JSON.parse(e.target.result); if(!Array.isArray(d.products)) throw 0;
      confirmBox('เขียนทับชีต?',`ไฟล์มีสินค้า ${d.products.length} รายการ — ข้อมูลสินค้าในชีตจะถูกแทนที่ทั้งหมด`,'เขียนขึ้นชีต',async()=>{
        try{ await withBusy(()=>apiPost('bulkImport',{products:d.products})); toast('กู้คืนขึ้นชีตแล้ว','ok'); await refresh(); }
        catch(err){ toast('ล้มเหลว: '+err.message,'bad'); }
      },false);
    }catch(err){ toast('ไฟล์ไม่ถูกต้อง','bad'); } };
    r.readAsText(f);
  };
  $('#bk-xlsx').onclick=()=>{
    const head=['SKU','ชื่อสินค้า','หมวดหมู่','ราคา','คงเหลือ','หน่วย','ขั้นต่ำ','สถานะ','หมายเหตุ'];
    const rows=DB.products.map(p=>[p.sku,p.name,p.cat,p.price,p.qty,p.unit,p.minQty,STATUS_TXT[status(p)],p.note||'']);
    const csv='\uFEFF'+[head,...rows].map(r=>r.map(c=>`"${String(c==null?'':c).replace(/"/g,'""')}"`).join(',')).join('\r\n');
    download(csv,`stock_export_${new Date().toISOString().slice(0,10)}.csv`,'text/csv;charset=utf-8'); toast('ส่งออก CSV แล้ว','ok');
  };
}
function download(content,name,type){
  const blob=new Blob([content],{type}); const url=URL.createObjectURL(blob);
  const a=document.createElement('a'); a.href=url; a.download=name; a.click(); setTimeout(()=>URL.revokeObjectURL(url),1000);
}

/* ============ BOOT ============ */
function boot(){
  $$('#nav button').forEach(b=>b.onclick=()=>go(b.dataset.page));
  $('#btn-logout').onclick=()=>confirmBox('ออกจากระบบ?','คุณต้องการออกจากระบบหรือไม่','ออกจากระบบ',logout,false);
  $('#btn-backup').onclick=openBackup;
  $('#btn-refresh').onclick=()=>refresh();
  $('#conn-retry').onclick=()=>refresh();
  go('dashboard');
  refresh();
}

/* ============ START ============ */
$('#lg-btn').onclick=doLogin;
$('#lg-pass').addEventListener('keydown',e=>{ if(e.key==='Enter') doLogin(); });
$('#lg-user').addEventListener('keydown',e=>{ if(e.key==='Enter') $('#lg-pass').focus(); });
if(sessGet()==='1'){ $('#login').classList.add('hidden'); $('#app').classList.remove('hidden'); boot(); }
else { $('#lg-user').focus(); }

</script>
